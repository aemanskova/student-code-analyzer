name: student-code-analyzer

services:
  backend:
    build:
      context: ./backend
    image: student-code-analyzer-backend
    container_name: student-code-analyzer-backend
    environment:
      PORT: 3000
      HTTP_REQUEST_TIMEOUT_MS: 0
      NODE_OPTIONS: --max-old-space-size=1024
      HTML_CSS_HEAVY_METRICS_BY_DEFAULT: "false"
      AXE_TIMEOUT_MS: 45000
      WORK_CONCURRENCY: 1
      GLOBAL_HEAVY_CONCURRENCY: 2
      HTML_PARSE_CONCURRENCY: 2
      CSS_PARSE_CONCURRENCY: 2
      VNU_CONCURRENCY: 1
      AXE_CONCURRENCY: 1
      JWT_SECRET: super_secret_jwt_for_development
      SQLITE_DB_PATH: /app/data/sqlite/app.db
      WORKS_ROOT: /app/works
      PATH_GROUP_INDEX: 0
      PATH_STUDENT_INDEX: 1
      SONAR_HOST: http://sonarqube:9000
      SONAR_SCANNER_BIN: sonar-scanner
      SONAR_TASK_TIMEOUT_MS: 120000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
      JS_ESLINT_ENABLED: "false"
      S3_BUCKET: analysis-uploads
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9100
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
    volumes:
      - ./data:/app/data
      - ./works:/app/works
    ports:
      - "3000:3000"
    mem_limit: 1536m
    depends_on:
      - minio
      - sonarqube

  frontend:
    build:
      context: ./frontend
    image: student-code-analyzer-frontend
    container_name: student-code-analyzer-frontend
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    environment:
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  minio:
    image: quay.io/minio/minio:latest
    container_name: student-code-analyzer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: student-code-analyzer-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/analysis-uploads || true &&
      printf '%s' '[{\"AllowedOrigins\":[\"http://localhost:5173\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"],\"MaxAgeSeconds\":3000}]' > /tmp/cors.json &&
      mc cors set local/analysis-uploads /tmp/cors.json
      "

  sonar-db:
    image: postgres:15
    container_name: student-code-analyzer-sonar-postgres
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    container_name: student-code-analyzer-sonarqube
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_TOKEN: ${SONAR_TOKEN}
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs

volumes:
  minio_data:
  sonar_db_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
